name: Run Data Sync

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: Force a full Notion resync
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master
    paths:
      - .github/workflows/run_data_sync.yml
      - run_page/notion_sync.py
      - requirements.txt

permissions:
  contents: write

env:
  GITHUB_NAME: koobai
  GITHUB_EMAIL: mekoobai@gmail.com
  WORKOUTS_PAGE_TIMEZONE: ${{ secrets.WORKOUTS_PAGE_TIMEZONE || 'Asia/Shanghai' }}
  NOTION_SYNC_OVERLAP_SECONDS: ${{ secrets.NOTION_SYNC_OVERLAP_SECONDS || '300' }}

jobs:
  sync:
    name: Sync Notion Workouts
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      WORKOUT_DATABASE_ID: ${{ secrets.WORKOUT_DATABASE_ID }}
      TYPE_DATABASE_ID: ${{ secrets.TYPE_DATABASE_ID }}
      SPLIT_DATABASE_ID: ${{ secrets.SPLIT_DATABASE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync workouts from Notion
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_sync }}" = "true" ]; then
            python run_page/notion_sync.py --full-sync
          else
            python run_page/notion_sync.py
          fi

      - name: Commit synced activities
        run: |
          if git diff --quiet -- src/static/activities.json; then
            echo "activities.json unchanged"
            exit 0
          fi

          git config --local user.email "${{ env.GITHUB_EMAIL }}"
          git config --local user.name "${{ env.GITHUB_NAME }}"
          git add src/static/activities.json
          git commit -m "Sync workouts data from Notion"
          git push origin HEAD:master
