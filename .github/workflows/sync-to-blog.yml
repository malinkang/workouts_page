name: Sync Activities to Hugo Blog

# 🌟 核心魔法：不再监听 push，而是监听 "Run Data Sync" 这个任务是否执行完毕
on:
  workflow_run:
    workflows: ["Run Data Sync"]
    types:
      - completed
  workflow_dispatch: # 保留手动触发按钮

jobs:
  sync-and-trigger:
    runs-on: ubuntu-latest
    # 🌟 确保只有当 "Run Data Sync" 成功跑完时，才执行搬运
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      # 1. 检出源仓库 (workouts_page)
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          path: 'source-repo'

      # 2. 检出目标仓库 (blog)，必须使用带有 workflow 权限的 PAT_TOKEN
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: 'koobai/blog'
          token: ${{ secrets.PAT_TOKEN }}
          path: 'target-repo'

      # 3. 复制文件并推送到 blog 的 main 分支
      - name: Copy File and Push
        run: |
          mkdir -p target-repo/assets
          
          # 从源项目的真实路径复制到 blog
          cp source-repo/src/static/activities.json target-repo/assets/activities.json

          cd target-repo

          # 设置机器人身份
          git config user.name "koobai"
          git config user.email "mekoobai@gmail.com"

          # 追踪文件的变更
          git add assets/activities.json
          
          # 判断是否有真实修改
          if git diff-index --quiet HEAD --; then
            echo "activities.json 内容无变化，跳过推送。"
          else
            git commit -m "Auto-sync: update activities.json from workouts_page"
            # 推送到目标项目 blog 的 main 分支
            git push origin main
            echo "文件跨仓库推送成功！已唤醒 koobai/blog 的部署流。"
          fi